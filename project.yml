name: SpotifyTray
options:
  minimumXcodeGenVersion: 2.43.0
  developmentLanguage: en
configs:
  Debug: debug
  Release: release
settings:
  base:
    PRODUCT_NAME: SpotifyTray
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: 14.0
targets:
  SpotifyTray:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.spotifytray
        INFOPLIST_FILE: SpotifyTray/Info.plist
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: 1
        MARKETING_VERSION: 1.0
        ENABLE_HARDENED_RUNTIME: YES
    sources:
      - path: Sources
    dependencies: []
  SpotifyTrayTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Tests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.spotifytray.tests
        PRODUCT_NAME: SpotifyTrayTests
        PRODUCT_MODULE_NAME: SpotifyTrayTests
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: SpotifyTray
