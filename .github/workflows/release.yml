name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: macos-15

    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      SPARKLE_ED_PRIVATE_KEY: ${{ secrets.SPARKLE_ED_PRIVATE_KEY }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Compute version
        id: version
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          BUILD_NUMBER="$(git rev-list --count HEAD)"
          IS_PRERELEASE="false"
          if [[ "$VERSION" == *-* ]]; then
            IS_PRERELEASE="true"
          fi
          echo "marketing_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build_number=$BUILD_NUMBER" >> "$GITHUB_OUTPUT"
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "Marketing version: $VERSION"
          echo "Build number: $BUILD_NUMBER"
          echo "Prerelease: $IS_PRERELEASE"

      - name: Import signing certificate
        run: |
          set -euo pipefail

          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          CERT_PATH="$RUNNER_TEMP/developer-id.p12"

          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/productbuild

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/[\"]//g' | tr -d '\n')

          rm -f "$CERT_PATH"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

          echo "Installed identities:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Build signed release app
        run: |
          set -euo pipefail
          xcodebuild \
            -project SpotifyTray.xcodeproj \
            -scheme SpotifyTray \
            -configuration Release \
            -derivedDataPath .build/DerivedData \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            OTHER_CODE_SIGN_FLAGS="--timestamp --options=runtime" \
            MARKETING_VERSION="${{ steps.version.outputs.marketing_version }}" \
            CURRENT_PROJECT_VERSION="${{ steps.version.outputs.build_number }}" \
            build

      - name: Re-sign Sparkle bundled helpers
        run: |
          set -euo pipefail
          APP=".build/DerivedData/Build/Products/Release/SpotifyTray.app"
          SPARKLE_FW="$APP/Contents/Frameworks/Sparkle.framework"

          if [ ! -d "$SPARKLE_FW" ]; then
            echo "::error::Sparkle.framework not found at $SPARKLE_FW"
            exit 1
          fi

          SIGN=(codesign --force --options runtime --timestamp --sign "Developer ID Application")

          "${SIGN[@]}" "$SPARKLE_FW/Versions/B/XPCServices/Downloader.xpc"
          "${SIGN[@]}" "$SPARKLE_FW/Versions/B/XPCServices/Installer.xpc"
          "${SIGN[@]}" "$SPARKLE_FW/Versions/B/Updater.app"
          "${SIGN[@]}" "$SPARKLE_FW/Versions/B/Autoupdate"
          "${SIGN[@]}" "$SPARKLE_FW"
          "${SIGN[@]}" "$APP"

      - name: Verify signature
        run: |
          set -euo pipefail
          APP=".build/DerivedData/Build/Products/Release/SpotifyTray.app"
          codesign --verify --deep --strict --verbose=2 "$APP"
          codesign --display --verbose=4 "$APP"

      - name: Submit to Apple notarization
        id: notarize
        run: |
          set -euo pipefail
          APP=".build/DerivedData/Build/Products/Release/SpotifyTray.app"
          NOTARIZE_ZIP="$RUNNER_TEMP/notarize-payload.zip"
          SUBMIT_OUTPUT="$RUNNER_TEMP/notarize-submit.txt"

          ditto -c -k --sequesterRsrc --keepParent "$APP" "$NOTARIZE_ZIP"

          xcrun notarytool submit "$NOTARIZE_ZIP" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait \
            --output-format json \
            | tee "$SUBMIT_OUTPUT"

          SUBMISSION_ID="$(jq -r .id "$SUBMIT_OUTPUT")"
          STATUS="$(jq -r .status "$SUBMIT_OUTPUT")"

          echo "submission_id=$SUBMISSION_ID" >> "$GITHUB_OUTPUT"
          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

          if [ "$STATUS" != "Accepted" ]; then
            echo "::error::Notarization returned status '$STATUS' (submission $SUBMISSION_ID). See the 'Fetch notarization log on failure' step for the rejection reason."
            exit 1
          fi

      - name: Fetch notarization log on failure
        if: failure() && steps.notarize.outputs.submission_id != ''
        run: |
          set -euo pipefail
          xcrun notarytool log "${{ steps.notarize.outputs.submission_id }}" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD"

      - name: Staple notarization ticket
        run: |
          set -euo pipefail
          APP=".build/DerivedData/Build/Products/Release/SpotifyTray.app"
          xcrun stapler staple "$APP"
          xcrun stapler validate "$APP"

      - name: Gatekeeper assessment
        run: |
          set -euo pipefail
          APP=".build/DerivedData/Build/Products/Release/SpotifyTray.app"
          spctl --assess --type execute --verbose=4 "$APP"

      - name: Package app
        run: |
          set -euo pipefail
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent \
            ".build/DerivedData/Build/Products/Release/SpotifyTray.app" \
            "dist/SpotifyTray.app.zip"

      - name: Create DMG
        run: |
          set -euo pipefail
          brew install create-dmg
          APP=".build/DerivedData/Build/Products/Release/SpotifyTray.app"
          DMG="dist/SpotifyTray.dmg"
          rm -f "$DMG"
          create-dmg \
            --volname "SpotifyTray" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 128 \
            --icon "SpotifyTray.app" 180 190 \
            --hide-extension "SpotifyTray.app" \
            --app-drop-link 480 190 \
            --no-internet-enable \
            "$DMG" \
            "$APP"

      - name: Sign update with Sparkle EdDSA
        id: sign_update
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          SPARKLE_VERSION="2.9.2"
          curl -sSL "https://github.com/sparkle-project/Sparkle/releases/download/${SPARKLE_VERSION}/Sparkle-${SPARKLE_VERSION}.tar.xz" \
            -o "$RUNNER_TEMP/sparkle.tar.xz"
          mkdir -p "$RUNNER_TEMP/sparkle"
          tar -xJf "$RUNNER_TEMP/sparkle.tar.xz" -C "$RUNNER_TEMP/sparkle"

          SIGN_UPDATE="$RUNNER_TEMP/sparkle/bin/sign_update"
          ZIP_PATH="dist/SpotifyTray.app.zip"

          SIGNATURE_LINE="$(printf '%s' "$SPARKLE_ED_PRIVATE_KEY" | "$SIGN_UPDATE" --ed-key-file - "$ZIP_PATH")"
          echo "sign_update output: $SIGNATURE_LINE"

          ED_SIGNATURE="$(printf '%s' "$SIGNATURE_LINE" | sed -nE 's/.*sparkle:edSignature="([^"]+)".*/\1/p')"
          LENGTH="$(printf '%s' "$SIGNATURE_LINE" | sed -nE 's/.*length="([^"]+)".*/\1/p')"

          if [ -z "$ED_SIGNATURE" ] || [ -z "$LENGTH" ]; then
            echo "::error::Failed to parse sign_update output: $SIGNATURE_LINE"
            exit 1
          fi

          echo "ed_signature=$ED_SIGNATURE" >> "$GITHUB_OUTPUT"
          echo "length=$LENGTH" >> "$GITHUB_OUTPUT"

      - name: Generate appcast.xml
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.marketing_version }}"
          BUILD_NUMBER="${{ steps.version.outputs.build_number }}"
          ED_SIGNATURE="${{ steps.sign_update.outputs.ed_signature }}"
          LENGTH="${{ steps.sign_update.outputs.length }}"
          PUB_DATE="$(date -u +"%a, %d %b %Y %H:%M:%S +0000")"
          DOWNLOAD_URL="https://github.com/anudeep-gad12/spotify-tray/releases/download/${GITHUB_REF_NAME}/SpotifyTray.app.zip"

          cat > dist/appcast.xml <<EOF
<?xml version="1.0" standalone="yes"?>
<rss xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle" version="2.0">
  <channel>
    <title>SpotifyTray</title>
    <link>https://github.com/anudeep-gad12/spotify-tray</link>
    <description>SpotifyTray release feed</description>
    <language>en</language>
    <item>
      <title>v${VERSION}</title>
      <pubDate>${PUB_DATE}</pubDate>
      <sparkle:version>${BUILD_NUMBER}</sparkle:version>
      <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
      <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
      <enclosure
        url="${DOWNLOAD_URL}"
        sparkle:edSignature="${ED_SIGNATURE}"
        length="${LENGTH}"
        type="application/octet-stream" />
    </item>
  </channel>
</rss>
EOF

          echo "Generated appcast.xml:"
          cat dist/appcast.xml

      - name: Clean up keychain
        if: always()
        run: |
          if [ -n "${KEYCHAIN_PATH:-}" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: SpotifyTray-app
          path: dist/SpotifyTray.app.zip

      - name: Attach assets to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/SpotifyTray.dmg
            dist/SpotifyTray.app.zip
            dist/appcast.xml
          prerelease: ${{ steps.version.outputs.is_prerelease == 'true' }}

      - name: Publish appcast to GitHub Pages
        if: startsWith(github.ref, 'refs/tags/')
        run: mkdir -p pages && cp dist/appcast.xml pages/appcast.xml

      - name: Deploy appcast feed
        if: startsWith(github.ref, 'refs/tags/')
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: pages
          keep_files: false

      - name: Update Homebrew tap
        if: startsWith(github.ref, 'refs/tags/') && steps.version.outputs.is_prerelease == 'false'
        env:
          HOMEBREW_TAP_SSH_KEY: ${{ secrets.HOMEBREW_TAP_SSH_KEY }}
          TAP_REPO: anudeep-gad12/homebrew-tap
        run: |
          if [ -z "$HOMEBREW_TAP_SSH_KEY" ]; then
            echo "::notice::Skipping Homebrew tap update because HOMEBREW_TAP_SSH_KEY is not configured."
            exit 0
          fi

          VERSION="${GITHUB_REF_NAME#v}"
          SHA256="$(shasum -a 256 dist/SpotifyTray.app.zip | awk '{print $1}')"

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir -p ~/.ssh
          printf '%s\n' "$HOMEBREW_TAP_SSH_KEY" > ~/.ssh/homebrew_tap
          chmod 600 ~/.ssh/homebrew_tap
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/homebrew_tap -o IdentitiesOnly=yes"

          git clone "git@github.com:${TAP_REPO}.git" homebrew-tap

          cd homebrew-tap
          ruby -0pi -e "gsub(/version \"[^\"]+\"/, \"version \\\"${VERSION}\\\"\"); gsub(/sha256 \"[a-f0-9]+\"/, \"sha256 \\\"${SHA256}\\\"\")" Casks/spotify-tray.rb

          if git diff --quiet; then
            echo "Homebrew cask already up to date."
            exit 0
          fi

          git add Casks/spotify-tray.rb
          git commit -m "Update SpotifyTray cask to v${VERSION}"
          git push
