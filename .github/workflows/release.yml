name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15

    env:
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
      APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Import signing certificate
        run: |
          set -euo pipefail

          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          CERT_PATH="$RUNNER_TEMP/developer-id.p12"

          echo "$APPLE_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/productbuild

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/[\"]//g' | tr -d '\n')

          rm -f "$CERT_PATH"

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

          echo "Installed identities:"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Build signed release app
        run: |
          set -euo pipefail
          xcodebuild \
            -project SpotifyTray.xcodeproj \
            -scheme SpotifyTray \
            -configuration Release \
            -derivedDataPath .build/DerivedData \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            OTHER_CODE_SIGN_FLAGS="--timestamp --options=runtime" \
            build

      - name: Verify signature
        run: |
          set -euo pipefail
          APP=".build/DerivedData/Build/Products/Release/SpotifyTray.app"
          codesign --verify --deep --strict --verbose=2 "$APP"
          codesign --display --verbose=4 "$APP"

      - name: Submit to Apple notarization
        run: |
          set -euo pipefail
          APP=".build/DerivedData/Build/Products/Release/SpotifyTray.app"
          NOTARIZE_ZIP="$RUNNER_TEMP/notarize-payload.zip"

          ditto -c -k --sequesterRsrc --keepParent "$APP" "$NOTARIZE_ZIP"

          xcrun notarytool submit "$NOTARIZE_ZIP" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --wait

      - name: Staple notarization ticket
        run: |
          set -euo pipefail
          APP=".build/DerivedData/Build/Products/Release/SpotifyTray.app"
          xcrun stapler staple "$APP"
          xcrun stapler validate "$APP"

      - name: Gatekeeper assessment
        run: |
          set -euo pipefail
          APP=".build/DerivedData/Build/Products/Release/SpotifyTray.app"
          spctl --assess --type execute --verbose=4 "$APP"

      - name: Package app
        run: |
          set -euo pipefail
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent \
            ".build/DerivedData/Build/Products/Release/SpotifyTray.app" \
            "dist/SpotifyTray.app.zip"

      - name: Clean up keychain
        if: always()
        run: |
          if [ -n "${KEYCHAIN_PATH:-}" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" || true
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: SpotifyTray-app
          path: dist/SpotifyTray.app.zip

      - name: Attach zip to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SpotifyTray.app.zip

      - name: Update Homebrew tap
        if: startsWith(github.ref, 'refs/tags/')
        env:
          HOMEBREW_TAP_SSH_KEY: ${{ secrets.HOMEBREW_TAP_SSH_KEY }}
          TAP_REPO: anudeep-gad12/homebrew-tap
        run: |
          if [ -z "$HOMEBREW_TAP_SSH_KEY" ]; then
            echo "::notice::Skipping Homebrew tap update because HOMEBREW_TAP_SSH_KEY is not configured."
            exit 0
          fi

          VERSION="${GITHUB_REF_NAME#v}"
          SHA256="$(shasum -a 256 dist/SpotifyTray.app.zip | awk '{print $1}')"

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir -p ~/.ssh
          printf '%s\n' "$HOMEBREW_TAP_SSH_KEY" > ~/.ssh/homebrew_tap
          chmod 600 ~/.ssh/homebrew_tap
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/homebrew_tap -o IdentitiesOnly=yes"

          git clone "git@github.com:${TAP_REPO}.git" homebrew-tap

          cd homebrew-tap
          ruby -0pi -e "gsub(/version \"[^\"]+\"/, \"version \\\"${VERSION}\\\"\"); gsub(/sha256 \"[a-f0-9]+\"/, \"sha256 \\\"${SHA256}\\\"\")" Casks/spotify-tray.rb

          if git diff --quiet; then
            echo "Homebrew cask already up to date."
            exit 0
          fi

          git add Casks/spotify-tray.rb
          git commit -m "Update SpotifyTray cask to v${VERSION}"
          git push
