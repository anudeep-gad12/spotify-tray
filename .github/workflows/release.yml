name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.4.app

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate project
        run: xcodegen generate

      - name: Build unsigned release app
        run: |
          xcodebuild \
            -project SpotifyTray.xcodeproj \
            -scheme SpotifyTray \
            -configuration Release \
            -derivedDataPath .build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

      - name: Package app
        run: |
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent \
            ".build/DerivedData/Build/Products/Release/SpotifyTray.app" \
            "dist/SpotifyTray.app.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: SpotifyTray-app
          path: dist/SpotifyTray.app.zip

      - name: Attach zip to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SpotifyTray.app.zip

      - name: Update Homebrew tap
        if: startsWith(github.ref, 'refs/tags/')
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAP_REPO: anudeep-gad12/homebrew-tap
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "::notice::Skipping Homebrew tap update because HOMEBREW_TAP_TOKEN is not configured."
            exit 0
          fi

          VERSION="${GITHUB_REF_NAME#v}"
          SHA256="$(shasum -a 256 dist/SpotifyTray.app.zip | awk '{print $1}')"

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/${TAP_REPO}.git" homebrew-tap

          cd homebrew-tap
          ruby -0pi -e "gsub(/version \"[^\"]+\"/, \"version \\\"${VERSION}\\\"\"); gsub(/sha256 \"[a-f0-9]+\"/, \"sha256 \\\"${SHA256}\\\"\")" Casks/spotify-tray.rb

          if git diff --quiet; then
            echo "Homebrew cask already up to date."
            exit 0
          fi

          git add Casks/spotify-tray.rb
          git commit -m "Update SpotifyTray cask to v${VERSION}"
          git push
